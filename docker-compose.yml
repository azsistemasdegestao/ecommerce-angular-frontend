services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      API_BASE_URL: http://localhost:8080
      # NG_ALLOWED_HOSTS is read at runtime by @angular/ssr (SSRF guard on the
      # Host header) without needing a rebuild; extend this list per environment.
      NG_ALLOWED_HOSTS: localhost:4000,localhost
      OTEL_SERVICE_NAME: ecommerce-frontend
      JAEGER_ENDPOINT: http://jaeger:4317
      JAEGER_OTLP_HTTP_ENDPOINT: http://jaeger:4318
      LOKI_URL: http://loki:3100
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    external: true
    name: ecommerce-network
